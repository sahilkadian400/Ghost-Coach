# Server Port Binding
server.port=8080

# PostgreSQL Database Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ghostcoach_db
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Configuration Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Boot Multipart File Upload Restrictions for high-res stance photos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom Security and JWT Access Controls
app.jwt.secret=your_super_high_security_random_secret_string_with_32_characters_minimum
app.jwt.expiration-ms=86400000

# external APIs
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
